name: Quality checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pytest>=8.0" "ruff>=0.5"

      - name: Validate repository structure
        run: python scripts/validate_repo.py

      - name: Security scan
        run: python scripts/security_scan.py

      - name: Generated indexes and README metrics are in sync
        run: |
          python scripts/update_indexes.py
          git diff --exit-code -- CATALOG.md TOPICS.md README.md 'paths/*/README.md' || {
            echo "::error::Generated docs are out of sync. Run scripts/update_indexes.py, then commit the result." >&2
            exit 1
          }

      - name: Compile all Python files
        run: python -m compileall -q .

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest
